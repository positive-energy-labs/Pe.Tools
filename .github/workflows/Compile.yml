name: Compile solution

on:
  push:
    branches:
      - "*"
  pull_request:

jobs:
  windows:
    name: blacksmith-windows-2025
    runs-on: blacksmith-4vcpu-windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Build.props', 'Directory.Packages.props', 'global.json', 'eng/sdk-feed/*.nupkg') }}
          restore-keys: ${{ runner.os }}-nuget-

      # Same triage a human runs locally: env, SDK pin reachability, lock-step pins.
      - name: pe-revit doctor
        run: |
          dotnet tool restore
          dotnet pe-revit doctor

      - name: Compile solution
        run: dotnet run -c Release
        working-directory: "build"
        env:
          DOTNET_ENVIRONMENT: ${{ github.ref_name == 'main' && 'Production' || 'Development' }}
