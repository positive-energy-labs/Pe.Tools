name: Compile solution

on:
  push:
    branches:
      - "*"
  pull_request:

jobs:
  windows:
    name: blacksmith-windows-2025
    runs-on: blacksmith-4vcpu-windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Build.props', 'Directory.Packages.props', 'global.json', 'eng/sdk-feed/*.nupkg') }}
          restore-keys: ${{ runner.os }}-nuget-

      # Same triage a human runs locally: env, SDK pin reachability, lock-step pins.
      - name: pe-revit doctor
        run: |
          dotnet tool restore
          dotnet pe-revit doctor

      # CI runs the same verbs a human runs: plain isolated builds per matrix slice
      # (net8 Debug, net48 Debug, Release). The build/ pipeline is pack/publish-only.
      - name: Compile Debug.R25
        run: dotnet build Pe.Tools.slnx -c Debug.R25 -v:q -nologo

      - name: Compile Debug.R23 (net48)
        run: dotnet build Pe.Tools.slnx -c Debug.R23 -v:q -nologo

      - name: Compile Release.R25
        run: dotnet build Pe.Tools.slnx -c Release.R25 -v:q -nologo
