<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pea — focal provenance demo</title>
    <style>
      :root {
        --pe-blue: #005695;
        --pe-blue-soft: #1f6fa8;
        --pe-green: #72c6a2;
        --slate: #4f6473;
        --lichen: #7c8b6b;
        --clay: #b78d6a;
        --clay-ink: #8a5e3b;
        --kiln: #c8bdaf;
        --basalt: #3e4340;
        --mist: #e8e4dd;
        --paper: #fbfaf7;
        --paper-2: #f4f1ea;
        --paper-3: #f7f4ed;
        --muted: #8a9088;
        --line: rgba(62, 67, 64, 0.12);
        --line-2: rgba(62, 67, 64, 0.2);
        --user-tint: rgba(114, 198, 162, 0.13);
        --user-line: rgba(114, 198, 162, 0.32);
        --font-body: "Open Sans", system-ui, -apple-system, sans-serif;
        --font-display: "Spectral", Georgia, serif;
        --font-mono: ui-monospace, "Cascadia Code", Menlo, monospace;
        --map: 116px;
        --trace: 232px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: var(--paper);
        color: var(--basalt);
        font-family: var(--font-body);
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      .app {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      /* ---- header ---- */
      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 20px;
        border-bottom: 0.5px solid var(--line);
      }
      .brand {
        font-family: var(--font-display);
        font-weight: 600;
        color: var(--pe-blue);
        font-size: 17px;
      }
      .toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 600;
        color: var(--slate);
        cursor: pointer;
        user-select: none;
      }
      .toggle input {
        accent-color: var(--pe-blue);
      }
      .hint {
        font-size: 11px;
        color: var(--muted);
        margin-left: auto;
        font-family: var(--font-mono);
      }

      /* ---- the one scroll surface ---- */
      .frame {
        position: relative;
        min-height: 0;
      }
      .scroller {
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        scroll-behavior: smooth;
      }
      .grid {
        display: grid;
        grid-template-columns: var(--map) minmax(0, 1fr) var(--trace);
        align-items: start;
      }

      /* ================= MapDial gutter — where are we ================= */
      .mapdial {
        position: sticky;
        top: 0;
        height: var(--vp, 720px);
        overflow: hidden;
        border-right: 0.5px solid var(--line);
        background: var(--paper-3);
        touch-action: none;
        user-select: none;
        cursor: ns-resize;
      }
      .mapdial-strip {
        position: absolute;
        inset: 0 0 auto 0;
        will-change: transform;
      }
      .band {
        position: absolute;
        left: 16px;
        width: 14px;
        border-radius: 2px;
        opacity: 0.4;
        transition:
          left 0.14s ease,
          width 0.14s ease,
          opacity 0.14s ease,
          transform 0.14s ease;
      }
      .band .num {
        position: absolute;
        left: 26px;
        top: 50%;
        transform: translateY(-50%);
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--slate);
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.14s ease;
        pointer-events: none;
      }
      /* on screen = inside the candlestick's viewport range */
      .band.in-reticle {
        opacity: 0.85;
      }
      /* focal = the single row sitting on the focal axis */
      .band.focal {
        opacity: 1;
        left: 12px;
        width: 24px;
        transform: scaleX(1.06);
        transform-origin: left;
        box-shadow:
          0 0 0 2px var(--paper-3),
          0 0 0 3px rgba(0, 86, 149, 0.35);
      }
      .band.focal .num {
        opacity: 1;
      }
      .band.user {
        background: var(--pe-green);
      }
      .band.assistant {
        background: var(--pe-blue);
      }
      .band.tool {
        background: transparent;
        box-shadow: inset 0 0 0 1.25px var(--pe-blue);
      }
      .band.tool.focal {
        box-shadow:
          inset 0 0 0 1.5px var(--pe-blue),
          0 0 0 2px var(--paper-3),
          0 0 0 3px rgba(0, 86, 149, 0.35);
      }
      .band.memory {
        background: var(--clay);
      }
      .band.user .num {
        color: var(--pe-green);
      }
      .band.assistant .num {
        color: var(--pe-blue);
      }

      /* ---- candlestick focal marker (replaces the reticle box) ----
         horizontal bar = the focal point in the thread;
         vertical wick + caps = the chat's active viewport, extending up/down. */
      .cs-focal {
        position: absolute;
        left: 0;
        right: 0;
        height: 0;
        border-top: 1.5px solid rgba(0, 86, 149, 0.6);
        pointer-events: none;
        z-index: 4;
      }
      .cs-wick {
        position: absolute;
        left: 58px;
        width: 0;
        border-left: 1px solid rgba(0, 86, 149, 0.32);
        pointer-events: none;
        z-index: 3;
      }
      .cs-cap {
        position: absolute;
        left: 50px;
        width: 16px;
        height: 0;
        border-top: 1px solid rgba(0, 86, 149, 0.32);
        pointer-events: none;
        z-index: 3;
      }
      .caret {
        position: absolute;
        right: -1px;
        width: 0;
        height: 0;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
        border-right: 7px solid var(--pe-blue);
        transform: translateY(-50%);
        pointer-events: none;
        z-index: 5;
      }

      /* ================= chat — high-level "what happened" ============= */
      .chat {
        padding: 18px 26px 60vh;
      }
      .moment {
        padding: 14px 0;
      }
      .who {
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 5px;
      }
      .who.user {
        color: var(--pe-green);
      }
      .who.assistant {
        color: var(--pe-blue);
      }
      .bubble {
        background: var(--user-tint);
        border: 0.5px solid var(--user-line);
        border-radius: 12px 12px 2px 12px;
        padding: 9px 13px;
        max-width: 80%;
        margin-left: auto;
        width: fit-content;
      }
      .prose {
        font-size: 14px;
        line-height: 1.62;
      }
      .marker {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        border-left: 2px solid var(--pe-blue);
        padding: 2px 8px 2px 11px;
        border-radius: 0 4px 4px 0;
        font-size: 13px;
        color: var(--slate);
        cursor: pointer;
        transition:
          background 0.14s ease,
          border-color 0.14s ease;
      }
      .marker.tool {
        border-left-style: dashed;
      }
      .marker.memory {
        border-left-color: var(--clay);
      }
      .marker code {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--lichen);
      }
      .tag {
        font-size: 10px;
        letter-spacing: 0.08em;
        border-radius: 4px;
        padding: 1px 6px;
        border: 0.5px solid rgba(183, 141, 106, 0.5);
        color: var(--clay-ink);
      }
      /* focal stub — gets a heavier accent rail (no dimming of the others) */
      .moment.focal .marker {
        border-left-width: 3px;
      }
      /* hover (or focal) a stub → tint it to match its highlighted card */
      .moment.focal .marker,
      .moment.hover .marker {
        background: rgba(0, 86, 149, 0.06);
      }

      /* ================= trace — the detail card column =============== */
      .lane {
        position: sticky;
        top: 0;
        height: var(--vp, 720px);
        overflow: hidden;
        border-left: 0.5px solid var(--line);
        background: var(--paper-3);
      }
      .lane-inner {
        position: absolute;
        inset: 0 0 auto 0;
        height: 100%;
      }
      .cell {
        position: absolute;
        left: 12px;
        right: 12px;
        border: 0.5px solid var(--line);
        border-radius: 6px;
        overflow: hidden;
        background: var(--paper);
        opacity: 0.62;
        transition:
          box-shadow 0.16s ease,
          border-color 0.16s ease,
          opacity 0.16s ease;
      }
      .cell .h {
        font-size: 9px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--slate);
        background: var(--paper-2);
        padding: 4px 8px;
      }
      .cell pre {
        margin: 0;
        padding: 7px 8px;
        font-family: var(--font-mono);
        font-size: 11px;
        line-height: 1.5;
        color: #5a5f5b;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 90px;
        overflow: hidden;
      }
      .cell.hover {
        opacity: 1;
        border-color: rgba(0, 86, 149, 0.4);
      }
      .cell.focal {
        opacity: 1;
        border-color: rgba(0, 86, 149, 0.55);
        box-shadow:
          0 1px 0 rgba(0, 86, 149, 0.08),
          0 6px 18px rgba(0, 86, 149, 0.14);
      }

      /* ---- the connector wires ---- */
      .wires {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 5;
      }
      .wires path {
        fill: none;
        stroke: var(--pe-blue);
      }
      .wires path.w {
        stroke-width: 1;
        opacity: 0.16;
      }
      .wires path.hover {
        stroke-width: 1.5;
        opacity: 0.55;
      }
      .wires path.f {
        stroke-width: 2;
        opacity: 0.9;
      }
      .wires path.hit {
        stroke: transparent;
        stroke-width: 11;
        pointer-events: stroke;
        cursor: pointer;
      }
      .wires circle {
        fill: var(--pe-blue);
      }

      /* the focal scrim — quiet vignette aligned to the focal axis */
      .scrim {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 6;
        background: linear-gradient(
          to bottom,
          rgba(251, 250, 247, 0.5) 0%,
          rgba(251, 250, 247, 0.12) 22%,
          rgba(251, 250, 247, 0) 38%,
          rgba(251, 250, 247, 0) 82%,
          rgba(251, 250, 247, 0.45) 94%,
          rgba(251, 250, 247, 0.5) 100%
        );
      }
    </style>
  </head>
  <body>
    <div class="app" id="app">
      <header>
        <span class="brand">Pea</span>
        <label class="toggle">
          <input type="checkbox" id="allLinks" checked />
          all links
        </label>
        <span class="hint">candlestick focal · funnel map→stub→detail · hover to trace</span>
      </header>
      <div class="frame">
        <div class="scroller" id="scroller">
          <div class="grid" id="grid">
            <div class="mapdial" id="mapdial">
              <div class="mapdial-strip" id="strip"></div>
              <div class="cs-wick" id="wick"></div>
              <div class="cs-cap" id="capTop"></div>
              <div class="cs-cap" id="capBot"></div>
              <div class="cs-focal" id="csFocal"></div>
              <div class="caret" id="caret"></div>
            </div>
            <div class="chat" id="chat"></div>
            <div class="lane trace"><div class="lane-inner" id="traceInner"></div></div>
          </div>
        </div>
        <svg class="wires" id="wires"></svg>
        <div class="scrim"></div>
      </div>
    </div>

    <script>
      // ---- fake thread: varied lengths so the proportional map is honest ----
      const L = (n) =>
        Array.from({ length: n }, () => "Lorem ipsum dolor sit amet consectetur. ").join("");
      const DATA = [
        { role: "user", t: "Can you refactor the auth module to use the new token store?" },
        {
          role: "assistant",
          t: "Sure. Let me look at the current implementation first.\n\n" + L(2),
        },
        { role: "tool", title: "Grep", target: "auth/**/*.ts" },
        { role: "tool", title: "Read", target: "auth/token-store.ts" },
        {
          role: "assistant",
          t: "Found three call sites. The legacy store is referenced in two places.\n\n" + L(4),
        },
        { role: "memory", summary: "User prefers token store over session cookies" },
        { role: "user", t: "Yeah go ahead, and add a test." },
        { role: "assistant", t: "Working on it.\n\n" + L(1) },
        { role: "tool", title: "Edit", target: "auth/login.ts" },
        { role: "tool", title: "Edit", target: "auth/refresh.ts" },
        { role: "tool", title: "Write", target: "auth/token-store.test.ts" },
        {
          role: "assistant",
          t: "Done. Migrated both call sites and added a round-trip test.\n\n" + L(6),
        },
        { role: "user", t: "Does this handle the expiry edge case?" },
        { role: "assistant", t: "Good catch — it didn't. Let me patch it.\n\n" + L(3) },
        { role: "tool", title: "Edit", target: "auth/token-store.ts" },
        { role: "memory", summary: "Expiry edge case: refresh 30s before exp" },
        { role: "assistant", t: "Patched. Refreshes 30s ahead of expiry now.\n\n" + L(2) },
        { role: "user", t: "Perfect. Now do the same for the API client." },
        { role: "assistant", t: "On it.\n\n" + L(5) },
        { role: "tool", title: "Read", target: "api/client.ts" },
        { role: "assistant", t: "The API client is bigger — about 12 call sites here.\n\n" + L(8) },
        { role: "user", t: "Just the critical-path ones for now." },
        { role: "assistant", t: "Understood, scoping to the 4 critical-path calls.\n\n" + L(3) },
      ];

      const SCALE = 0.14; // chat px -> map px. fixed, not fit-to-container.
      const FOCAL = 0.6; // focal axis, fraction down the viewport.
      const MIN_BAND = 3;
      const CARD_GAP = 12; // min px between cards when they de-overlap

      const chat = document.getElementById("chat");
      const strip = document.getElementById("strip");
      const caret = document.getElementById("caret");
      const wick = document.getElementById("wick");
      const capTop = document.getElementById("capTop");
      const capBot = document.getElementById("capBot");
      const csFocal = document.getElementById("csFocal");
      const scroller = document.getElementById("scroller");
      const mapdial = document.getElementById("mapdial");
      const traceInner = document.getElementById("traceInner");
      const wires = document.getElementById("wires");
      const frame = document.querySelector(".frame");
      const allLinks = document.getElementById("allLinks");
      const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

      // render chat
      DATA.forEach((d, i) => {
        const m = document.createElement("div");
        m.className = "moment";
        m.dataset.key = String(i);
        m.dataset.time = `14:${String(2 + i).padStart(2, "0")}`;
        if (d.role === "user") {
          m.innerHTML = `<div class="who user">you</div><div class="bubble">${d.t}</div>`;
        } else if (d.role === "assistant") {
          m.innerHTML = `<div class="who assistant">pea</div><div class="prose">${d.t.replace(/\n\n/g, "<br><br>")}</div>`;
        } else if (d.role === "tool") {
          m.innerHTML = `<div class="marker tool">⌗ ${d.title} <code>${d.target}</code></div>`;
        } else if (d.role === "memory") {
          m.innerHTML = `<div class="marker memory"><span class="tag">MEMORY</span> ${d.summary}</div>`;
        }
        chat.appendChild(m);
      });

      // render detail cards, each tagged with the chat-stub key it belongs to
      const cards = [];
      const cardByKey = {};
      DATA.forEach((d, i) => {
        if (d.role !== "tool" && d.role !== "memory") return;
        const c = document.createElement("div");
        c.className = "cell";
        c.dataset.key = String(i);
        c.innerHTML =
          d.role === "tool"
            ? `<div class="h">${d.title} · ${d.target}</div><pre>{\n  "ok": true,\n  "path": "${d.target}"\n}</pre>`
            : `<div class="h">memory · write</div><pre>${d.summary}</pre>`;
        traceInner.appendChild(c);
        const card = { key: i, el: c };
        cards.push(card);
        cardByKey[i] = card;
      });

      // ---- geometry, cached on layout ----
      let geom = [];
      let geomByKey = {};
      let momentByKey = {};
      let frameTop = 0;
      let frameLeft = 0;
      let hoverKey = null;

      function measure() {
        document.getElementById("grid").style.setProperty("--vp", scroller.clientHeight + "px");
        geom = [...chat.querySelectorAll(".moment")].map((el) => ({
          key: el.dataset.key,
          role: DATA[+el.dataset.key].role,
          top: el.offsetTop,
          height: el.offsetHeight,
          time: el.dataset.time,
        }));
        geomByKey = Object.fromEntries(geom.map((g) => [g.key, g]));
        momentByKey = Object.fromEntries(
          [...chat.querySelectorAll(".moment")].map((el) => [el.dataset.key, el]),
        );

        strip.innerHTML = "";
        geom.forEach((g) => {
          const b = document.createElement("div");
          b.className = "band " + g.role;
          b.dataset.key = g.key;
          b.style.top = g.top * SCALE + "px";
          b.style.height = Math.max(MIN_BAND, g.height * SCALE) + "px";
          b.innerHTML = `<span class="num">${g.time}</span>`;
          strip.appendChild(b);
        });

        const fr = frame.getBoundingClientRect();
        frameTop = fr.top;
        frameLeft = fr.left;
        wires.setAttribute("viewBox", `0 0 ${fr.width} ${fr.height}`);
        wires.setAttribute("width", fr.width);
        wires.setAttribute("height", fr.height);
        sync();
      }

      // smooth horizontal-ish bezier between two points
      function wire(x1, y1, x2, y2, cls) {
        const dx = (x2 - x1) * 0.5;
        return `<path class="${cls}" d="M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}"/>`;
      }
      function hit(x1, y1, x2, y2, key) {
        const dx = (x2 - x1) * 0.5;
        return `<path class="hit" data-key="${key}" d="M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}"/>`;
      }

      function sync() {
        const s = scroller.scrollTop;
        const V = scroller.clientHeight;
        const focalG = FOCAL * V;
        const fy = FOCAL * V;

        // candlestick: horizontal focal bar + vertical wick (the viewport extent)
        const wickTop = focalG - SCALE * FOCAL * V;
        const wickH = SCALE * V;
        wick.style.top = wickTop + "px";
        wick.style.height = wickH + "px";
        capTop.style.top = wickTop + "px";
        capBot.style.top = wickTop + wickH + "px";
        csFocal.style.top = fy + "px";
        caret.style.top = fy + "px";

        strip.style.transform = `translateY(${focalG - SCALE * (s + FOCAL * V)}px)`;

        // which stub sits on the focal axis?
        const focalDoc = s + FOCAL * V;
        let fk = -1;
        for (const g of geom) {
          if (g.top <= focalDoc && focalDoc < g.top + g.height) {
            fk = +g.key;
            break;
          }
          if (g.top <= focalDoc) fk = +g.key;
        }

        // map bands: on-screen range + the single focal band
        const bands = strip.children;
        geom.forEach((g, i) => {
          const on = g.top + g.height > s && g.top < s + V;
          bands[i].classList.toggle("in-reticle", on);
          bands[i].classList.toggle("focal", +g.key === fk);
        });

        // chat focal stub + hover (NO dimming of the others)
        chat.querySelectorAll(".moment").forEach((el) => {
          const k = +el.dataset.key;
          el.classList.toggle("focal", k === fk);
          el.classList.toggle("hover", k === hoverKey);
        });

        // detail cards ride at their stub's y; the focal card is pinned to the axis
        positionPinned(s, V, fk);
        cards.forEach((c) => {
          c.el.classList.toggle("focal", c.key === fk);
          c.el.classList.toggle("hover", c.key === hoverKey && c.key !== fk);
        });

        drawWires(fy, fk);
      }

      // Cards track their owning stub's center. The focal card is pinned exactly to
      // the focal axis (the hard requirement), and the rest de-overlap around it.
      function positionPinned(s, V, fk) {
        const fy = FOCAL * V;
        const vis = [];
        cards.forEach((c) => {
          const g = geomByKey[c.key];
          const center = g.top + g.height / 2 - s;
          if (center < -80 || center > V + 80) {
            c.el.style.display = "none";
            return;
          }
          c.el.style.display = "";
          c._center = center;
          vis.push(c);
        });
        vis.sort((a, b) => a._center - b._center);
        vis.forEach((c) => {
          c._h = c.el.offsetHeight;
          c._top = c._center - c._h / 2;
        });
        // forward de-overlap (top-down)
        for (let i = 1; i < vis.length; i++) {
          const prev = vis[i - 1];
          vis[i]._top = Math.max(vis[i]._top, prev._top + prev._h + CARD_GAP);
        }
        // pin the focal card exactly on the axis, shift the stack to match
        const f = vis.find((c) => c.key === fk);
        if (f) {
          const delta = fy - f._h / 2 - f._top;
          vis.forEach((c) => (c._top += delta));
        }
        vis.forEach((c) => (c.el.style.top = c._top + "px"));
        // ponytail: a dense cluster of cards near the focal one can still slide a
        // neighbour off its exact stub-y; the focal card itself stays pinned.
      }

      // frame-local box for an element (columns are edge-adjacent, so wires anchor
      // to real element rects, not column edges, to get horizontal spread)
      function box(el) {
        if (!el || el.offsetParent === null) return null;
        const r = el.getBoundingClientRect();
        return {
          L: r.left - frameLeft,
          R: r.right - frameLeft,
          Y: r.top + r.height / 2 - frameTop,
        };
      }

      function drawWires(fy, fk) {
        let p = "";
        const showAll = allLinks.checked;
        // light links for every visible non-focal card (persistent provenance)
        cards.forEach((c) => {
          if (c.key === fk) return;
          const draw = showAll || c.key === hoverKey;
          if (!draw) return;
          const stub = box(momentByKey[c.key]);
          const card = box(c.el);
          if (!stub || !card) return;
          const cls = c.key === hoverKey ? "hover" : "w";
          p += wire(stub.R, stub.Y, card.L, card.Y, cls);
          if (showAll) p += hit(stub.R, stub.Y, card.L, card.Y, c.key);
        });
        // the focal funnel: band -> stub -> card (bright). The card is pinned to the
        // axis, so stub->card is a clean near-horizontal tie at the focal line.
        const band = box(strip.querySelector(".band.focal"));
        const stub = box(chat.querySelector(".moment.focal"));
        const card = box(traceInner.querySelector(".cell.focal"));
        if (band && stub) {
          p += wire(band.R, band.Y, stub.L, fy, "f");
          p += `<circle cx="${stub.L}" cy="${fy}" r="2.5"/>`;
        }
        if (stub && card) p += wire(stub.R, fy, card.L, card.Y, "f");
        wires.innerHTML = p;
      }

      let raf = 0;
      const schedule = () => {
        cancelAnimationFrame(raf);
        raf = requestAnimationFrame(sync);
      };
      scroller.addEventListener("scroll", schedule, { passive: true });
      new ResizeObserver(measure).observe(scroller);
      allLinks.addEventListener("change", schedule);

      // hover a tool/memory stub, its card, or its link -> highlight the pair
      function setHover(key) {
        const next = key == null ? null : +key;
        if (next === hoverKey) return;
        hoverKey = next != null && cardByKey[next] ? next : null;
        schedule();
      }
      chat.addEventListener("mouseover", (e) => setHover(e.target.closest(".moment")?.dataset.key));
      chat.addEventListener("mouseleave", () => setHover(null));
      traceInner.addEventListener("mouseover", (e) =>
        setHover(e.target.closest(".cell")?.dataset.key),
      );
      traceInner.addEventListener("mouseleave", () => setHover(null));
      wires.addEventListener("mouseover", (e) => setHover(e.target.closest(".hit")?.dataset.key));
      wires.addEventListener("mouseout", (e) => {
        if (e.target.closest(".hit")) setHover(null);
      });

      // drag the gutter to scrub; tap a band to center it on the focal axis
      mapdial.addEventListener("pointerdown", (e) => {
        const startY = e.clientY;
        const startScroll = scroller.scrollTop;
        const key = e.target.closest(".band")?.dataset.key;
        let dragged = false;
        const move = (ev) => {
          if (Math.abs(ev.clientY - startY) > 3) dragged = true;
          if (dragged) scroller.scrollTop = startScroll + (ev.clientY - startY) / SCALE;
        };
        const up = () => {
          window.removeEventListener("pointermove", move);
          window.removeEventListener("pointerup", up);
          if (!dragged && key != null) {
            const g = geomByKey[key];
            if (g)
              scroller.scrollTo({ top: g.top - FOCAL * scroller.clientHeight, behavior: "smooth" });
          }
        };
        window.addEventListener("pointermove", move);
        window.addEventListener("pointerup", up);
      });

      measure();
    </script>
  </body>
</html>
