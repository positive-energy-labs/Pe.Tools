packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@assistant-ui/react": ^0.14.23
  "@assistant-ui/react-markdown": ^0.14.4
  "@base-ui/react": ^1.6.0
  "@tanstack/react-hotkeys": ^0.10.0
  "@types/node": ^24
  ajv: ^8.20.0
  cmdk: ^1.1.1
  json-schema-to-typescript: ^15.0.4
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@0.2.1
  vite-plus: 0.2.1
overrides:
  vite: "catalog:"
patchedDependencies:
  vite-plus@0.2.1: patches/vite-plus@0.2.1.patch
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  "@google/genai": false
  "@makeomatic/ffi-napi": true
  "@makeomatic/ref-napi": true
  agent-browser: false
  bufferutil: false
  edgedriver: false
  geckodriver: false
  koffi: false
  msgpackr-extract: false
  onnxruntime-node: false
  protobufjs: false
minimumReleaseAgeExclude:
  - lucide-react@1.21.0
  - "@mastra/core@1.48.0-alpha.4"
  - "@mastra/github-signals@0.2.2"
  - "@mastra/hono@1.5.3-alpha.4"
  - "@mastra/libsql@1.14.2"
  - "@mastra/mcp@1.12.0"
  - "@mastra/memory@1.21.3-alpha.0"
  - "@mastra/observability@1.15.2"
  - "@mastra/pg@1.14.2"
  - "@mastra/server@1.48.0-alpha.4"
  - mastracode@0.27.0-alpha.4
  - "@mastra/schema-compat@1.3.2-alpha.0"
