packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@assistant-ui/react": ^0.14.23
  "@assistant-ui/react-markdown": ^0.14.4
  '@base-ui/react': ^1.6.0
  '@tanstack/react-hotkeys': ^0.10.0
  "@types/node": ^24
  cmdk: ^1.1.1
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: 0.2.0
overrides:
  vite: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  "@google/genai": false
  "@makeomatic/ffi-napi": true
  "@makeomatic/ref-napi": true
  agent-browser: false
  bufferutil: false
  edgedriver: false
  geckodriver: false
  koffi: false
  onnxruntime-node: false
  protobufjs: false
minimumReleaseAgeExclude:
  - lucide-react@1.21.0
  - "@mastra/core@1.46.1-alpha.1"
  - "@mastra/github-signals@0.2.2-alpha.0"
  - "@mastra/libsql@1.14.1"
  - "@mastra/mcp@1.12.0"
  - "@mastra/memory@1.21.2-alpha.0"
  - "@mastra/observability@1.15.1"
  - "@mastra/pg@1.14.1"
  - mastracode@0.25.1-alpha.1
